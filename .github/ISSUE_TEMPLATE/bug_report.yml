name: Bug report
description: Report a reproducible bug in Evidpath.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for us to reproduce it.
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command or workflow you ran.
      placeholder: evidpath audit --domain recommender --target-url ...
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.11.13
    validations:
      required: true
  - type: dropdown
    id: install_source
    attributes:
      label: Install source
      options:
        - PyPI
        - TestPyPI
        - Editable checkout
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: shell
