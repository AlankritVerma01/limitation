name: evidpath-ci

on:
  push:
    paths:
      - ".github/workflows/evidpath-ci.yml"
      - ".github/workflows/evidpath-publish.yml"
      - ".github/workflows/evidpath-release-please.yml"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "products/evidpath/**"
  pull_request:
    paths:
      - ".github/workflows/evidpath-ci.yml"
      - ".github/workflows/evidpath-publish.yml"
      - ".github/workflows/evidpath-release-please.yml"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "products/evidpath/**"
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked

      - name: Lint evidpath
        run: |
          uv run --locked ruff check products/evidpath

      - name: Run evidpath tests
        run: |
          uv run --locked pytest products/evidpath/tests -q

  determinism:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked

      - name: Run determinism check
        run: |
          uv run --locked pytest products/evidpath/tests/test_determinism_slow.py --run-slow -v

      - name: Run in-process driver determinism check
        run: |
          pytest products/evidpath/tests/domains/recommender/test_drivers_in_process_slow.py::test_in_process_audit_is_deterministic_across_twin_runs --run-slow -v

  slow-tests:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked --group hf-example

      - name: Run slow Evidpath tests
        run: |
          uv run --locked --group hf-example pytest products/evidpath/tests -q --run-slow

  build-and-smoke:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked

      - name: Build wheel and sdist
        run: |
          uv build --package evidpath --out-dir products/evidpath/dist

      - name: Check distribution metadata
        run: |
          uv run --locked twine check products/evidpath/dist/*

      - name: Smoke install built wheel
        run: |
          uv run --no-project --with products/evidpath/dist/*.whl evidpath --help
          uv run --no-project --with products/evidpath/dist/*.whl python -m evidpath --help

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: evidpath-dist
          path: products/evidpath/dist/*
          if-no-files-found: error
