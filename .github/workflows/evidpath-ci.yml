name: evidpath-ci

on:
  push:
    paths:
      - ".github/workflows/evidpath-ci.yml"
      - ".github/workflows/evidpath-publish.yml"
      - ".github/workflows/evidpath-release-please.yml"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "products/evidpath/**"
  pull_request:
    paths:
      - ".github/workflows/evidpath-ci.yml"
      - ".github/workflows/evidpath-publish.yml"
      - ".github/workflows/evidpath-release-please.yml"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "products/evidpath/**"
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./products/evidpath[dev]

      - name: Lint evidpath
        run: |
          ruff check products/evidpath

      - name: Run evidpath tests
        run: |
          pytest products/evidpath/tests -q

  slow-tests:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and slow-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./products/evidpath[dev,hf-example]

      - name: Run slow Evidpath tests
        run: |
          pytest products/evidpath/tests -q --run-slow

  build-and-smoke:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel and sdist
        working-directory: products/evidpath
        run: |
          python -m build

      - name: Check distribution metadata
        working-directory: products/evidpath
        run: |
          twine check dist/*

      - name: Smoke install built wheel
        run: |
          python -m pip install products/evidpath/dist/*.whl
          evidpath --help
          python -m evidpath --help

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: evidpath-dist
          path: products/evidpath/dist/*
          if-no-files-found: error
