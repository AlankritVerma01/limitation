name: evidpath-publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: "Package index to publish to"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: evidpath-publish-${{ github.ref_name || inputs.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("products/evidpath/pyproject.toml", "rb") as package_file:
              version = tomllib.load(package_file)["project"]["version"]

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"Release tag {tag!r} does not match package version {expected!r}."
              )
          PY

      - name: Build wheel and sdist
        working-directory: products/evidpath
        run: |
          python -m build

      - name: Check distribution metadata
        working-directory: products/evidpath
        run: |
          twine check dist/*

      - name: Smoke install built wheel
        run: |
          python -m pip install products/evidpath/dist/*.whl
          evidpath --help
          python -m evidpath --help

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: evidpath-dist
          path: products/evidpath/dist/*
          if-no-files-found: error

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/evidpath

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: evidpath-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    if: (github.event_name == 'release' && startsWith(github.ref_name, 'v')) || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/evidpath

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: evidpath-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
